name: Sync main to integration

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main into integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout integration
          git merge main --no-edit

          # Restore integration's own .gitignore after merge
          git checkout integration -- .gitignore

          # Push to a temp branch instead of directly to integration
          git checkout -b bot/sync-main-to-integration
          git push origin bot/sync-main-to-integration --force

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/sync-main-to-integration
          base: integration
          title: "chore: sync main into integration"
          body: "Automated PR — syncing latest changes from `main` into `integration`."
          delete-branch: true

      - name: Enable auto-merge
        run: gh pr merge --auto --merge "bot/sync-main-to-integration"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}